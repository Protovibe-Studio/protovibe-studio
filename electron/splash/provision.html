<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Protovibe</title>
<style>
  :root {
    --bg: #0f1117;
    --fg: #e6e8ee;
    --muted: #8a90a3;
    --primary: oklch(61.59% 0.20711 262.9); /* matches --primary in the manager */
    --error: #ff7a7a;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 36px;
    user-select: none;
    -webkit-app-region: drag;
  }
  .logo { height: 22px; width: auto; align-self: flex-start; }
  .row { display: flex; align-items: center; gap: 12px; margin-top: 32px; }
  .spinner {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step { font-size: 14px; font-weight: 500; }
  .funny { margin-top: 14px; font-size: 12px; color: var(--muted); min-height: 16px; }
  pre {
    display: none;
    flex: 1; margin-top: 16px; padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    font: 11px/1.5 ui-monospace, Menlo, monospace;
    color: var(--muted);
    overflow: hidden;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .error { color: var(--error); }
  .actions { display: none; gap: 10px; margin-top: 16px; -webkit-app-region: no-drag; }
  .visible { display: flex; }
  pre.visible { display: block; }
  button {
    background: rgba(255,255,255,0.08);
    color: var(--fg);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 7px;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { background: rgba(255,255,255,0.14); }
  button.primary { background: var(--primary); color: #fff; border: none; }
</style>
</head>

  <div class="row">
    <div class="spinner" id="spinner"></div>
    <div class="step" id="step">Starting up…</div>
  </div>
  <div class="funny" id="funny"></div>
  <pre id="log"></pre>
  <div class="actions" id="actions">
    <button class="primary" id="retry">Retry</button>
    <button id="openLog">Open log</button>
  </div>
<script>
  const stepEl = document.getElementById('step');
  const funnyEl = document.getElementById('funny');
  const logEl = document.getElementById('log');
  const actions = document.getElementById('actions');
  const spinner = document.getElementById('spinner');
  const lines = [];

  const FUNNY = [
    'Unpacking a fresh set of brushes…',
    'Stocking the studio shelves…',
    'Sharpening every pencil…',
    'Mixing the paint…',
    'Laying out the drawing tools…',
    'Aligning pixels into a tidy grid…',
    'Untangling the cables behind the desk…',
    'Adjusting the lighting…',
    'Almost there, pinky promise…',
  ];
  let funnyIndex = 0;
  let funnyTimer = setInterval(() => {
    funnyEl.textContent = FUNNY[funnyIndex++ % FUNNY.length];
  }, 3000);

  window.protovibeSplash.onProgress(({ step, line }) => {
    if (step) stepEl.textContent = step;
    if (line) {
      for (const l of line.split('\n')) {
        if (!l.trim()) continue;
        lines.push(l);
        if (lines.length > 8) lines.shift();
      }
    }
  });

  window.protovibeSplash.onError(({ message, tail }) => {
    clearInterval(funnyTimer);
    funnyEl.textContent = '';
    stepEl.textContent = message;
    stepEl.classList.add('error');
    spinner.style.display = 'none';
    logEl.textContent = tail || lines.join('\n');
    logEl.classList.add('visible');
    actions.classList.add('visible');
  });

  document.getElementById('retry').addEventListener('click', () => {
    stepEl.classList.remove('error');
    spinner.style.display = '';
    actions.classList.remove('visible');
    logEl.classList.remove('visible');
    stepEl.textContent = 'Retrying…';
    funnyTimer = setInterval(() => {
      funnyEl.textContent = FUNNY[funnyIndex++ % FUNNY.length];
    }, 3000);
    window.protovibeSplash.retry();
  });
  document.getElementById('openLog').addEventListener('click', () => window.protovibeSplash.openLog());
</script>
